name: onelive
version: 0.1.0+1
publish_to: none
description: "OneLive — 跨平台直播聚合应用，支持抖音/B站/斗鱼/虎牙"
environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  simple_live_core:
    path: ./simple_live_core

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 网络
  dio: ^5.5.0+1

  # 数据库
  drift: ^2.21.0

  # 数据类
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 视频播放
  media_kit: ^1.2.2
  media_kit_video: ^2.0.0
  media_kit_libs_video: ^1.0.7

  # 工具
  logger: ^2.4.0
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  package_info_plus: ^9.0.0
  device_info_plus: ^12.2.0
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  connectivity_plus: ^7.0.0
  wakelock_plus: ^1.4.0
  screen_brightness: ^2.1.7
  window_manager: ^0.5.1
  volume_controller: ^3.4.0
  uuid: ^4.5.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_staggered_grid_view: ^0.7.0
  extended_image: ^10.0.1
  lottie: ^3.3.2
  flutter_smart_dialog: ^4.9.8+9
  dynamic_color: ^1.8.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  drift_dev: ^2.21.0
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lotties/
